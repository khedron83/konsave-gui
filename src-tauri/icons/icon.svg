<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3050"/>
      <stop offset="100%" stop-color="#0c1824"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Back card (shadow/depth) -->
  <rect x="116" y="148" width="296" height="210" rx="14" fill="#0a1628" opacity="0.9"/>

  <!-- Middle card -->
  <rect x="98" y="128" width="296" height="210" rx="14" fill="#0f1e30" stroke="#1e3050" stroke-width="1.5"/>

  <!-- Front card -->
  <rect x="80" y="108" width="296" height="210" rx="14" fill="url(#screen)" stroke="#334155" stroke-width="2"/>

  <!-- Card header bar -->
  <rect x="80" y="108" width="296" height="28" rx="14" fill="#1e293b"/>
  <rect x="80" y="122" width="296" height="14" fill="#1e293b"/>

  <!-- Header dots -->
  <circle cx="104" cy="122" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="122" cy="122" r="6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="140" cy="122" r="6" fill="#22c55e" opacity="0.8"/>

  <!-- Content lines (representing config entries) -->
  <rect x="104" y="154" width="130" height="7" rx="3.5" fill="#3b82f6" opacity="0.9"/>
  <rect x="104" y="173" width="96" height="6" rx="3" fill="#475569" opacity="0.7"/>
  <rect x="104" y="191" width="112" height="6" rx="3" fill="#475569" opacity="0.55"/>
  <rect x="104" y="209" width="80" height="6" rx="3" fill="#475569" opacity="0.4"/>
  <rect x="104" y="227" width="120" height="6" rx="3" fill="#475569" opacity="0.35"/>
  <rect x="104" y="245" width="72" height="6" rx="3" fill="#475569" opacity="0.3"/>
  <rect x="104" y="263" width="104" height="6" rx="3" fill="#475569" opacity="0.25"/>

  <!-- Save badge (bottom-right) -->
  <circle cx="358" cy="328" r="68" fill="#0c1824"/>
  <circle cx="358" cy="328" r="60" fill="#1d4ed8"/>

  <!-- Down-arrow save symbol -->
  <line x1="358" y1="296" x2="358" y2="334" stroke="#dce8f5" stroke-width="11" stroke-linecap="round"/>
  <polyline points="334,318 358,346 382,318" fill="none" stroke="#dce8f5" stroke-width="11"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Base bar of save symbol -->
  <line x1="334" y1="356" x2="382" y2="356" stroke="#dce8f5" stroke-width="8" stroke-linecap="round"/>
</svg>
